<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Weather Station</title>
<style>
  /* ---------- Easy customization: edit these variables ---------- */
  :root {
    --bg-color: #0f1724;
    --card-color: #182338;
    --accent-color: #4fb0ff;
    --text-color: #eef2f7;
    --muted-color: #93a1b5;
    --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 2rem 1rem;
    background: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-family);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin-bottom: 0.25rem;
    font-weight: 600;
  }

  #subtitle {
    color: var(--muted-color);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 900px;
  }

  .card {
    background: var(--card-color);
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .card .label {
    color: var(--muted-color);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .card .value {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--accent-color);
  }

  .card .unit {
    font-size: 1rem;
    color: var(--muted-color);
    margin-left: 0.2rem;
  }

  #status {
    margin-top: 2rem;
    color: var(--muted-color);
    font-size: 0.85rem;
    text-align: center;
  }

  #error-banner {
    display: none;
    background: #4a1f1f;
    color: #ffb4b4;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    margin-bottom: 1.5rem;
    max-width: 900px;
    width: 100%;
    text-align: center;
  }
</style>
</head>
<body>

  <h1>🌦️ My Weather Station</h1>
  <div id="subtitle">Loading...</div>

  <div id="error-banner"></div>

  <div class="grid" id="grid">
    <!-- Cards are injected by JS below -->
  </div>

  <div id="status"></div>

<script>
  // Path to the JSON file the GitHub Action keeps updated.
  const DATA_URL = 'data/weather.json';
  // How often (ms) the page re-fetches the file to check for new data.
  const REFRESH_INTERVAL_MS = 60 * 1000;

  // Define which fields to show, in order, and how to label/format them.
  // Add, remove, or reorder entries here to customize the dashboard.
  const FIELDS = [
    { key: 'temp',           label: 'Temperature',   unit: '°F' },
    { key: 'heatIndex',      label: 'Heat Index',    unit: '°F' },
    { key: 'windChill',      label: 'Wind Chill',    unit: '°F' },
    { key: 'dewpt',          label: 'Dew Point',     unit: '°F' },
    { key: 'humidity',       label: 'Humidity',      unit: '%'  },
    { key: 'windSpeed',      label: 'Wind Speed',    unit: 'mph' },
    { key: 'windGust',       label: 'Wind Gust',     unit: 'mph' },
    { key: 'winddir',        label: 'Wind Dir',      unit: '°'  },
    { key: 'pressure',       label: 'Pressure',      unit: 'inHg' },
    { key: 'precipRate',     label: 'Precip Rate',   unit: 'in/hr' },
    { key: 'precipTotal',    label: 'Precip Today',  unit: 'in' },
    { key: 'solarRadiation', label: 'Solar Rad.',    unit: 'W/m²' },
    { key: 'uv',             label: 'UV Index',      unit: ''   },
  ];

  const grid = document.getElementById('grid');
  const subtitle = document.getElementById('subtitle');
  const status = document.getElementById('status');
  const errorBanner = document.getElementById('error-banner');

  function renderCards(data) {
    grid.innerHTML = '';
    FIELDS.forEach(field => {
      const value = data[field.key];
      if (value === undefined || value === null) return;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="label">${field.label}</div>
        <div class="value">${value}<span class="unit">${field.unit}</span></div>
      `;
      grid.appendChild(card);
    });
  }

  async function loadData() {
    try {
      const res = await fetch(DATA_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      renderCards(data);
      subtitle.textContent = data.neighborhood
        ? `Station ${data.stationID} — ${data.neighborhood}`
        : `Station ${data.stationID}`;

      errorBanner.style.display = 'none';
      status.textContent = `Last observation: ${data.obsTimeLocal || 'unknown'} · Page checked: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      errorBanner.textContent = `Couldn't load weather data: ${err.message}`;
      errorBanner.style.display = 'block';
      status.textContent = `Last check attempt: ${new Date().toLocaleTimeString()}`;
    }
  }

  loadData();
  setInterval(loadData, REFRESH_INTERVAL_MS);
</script>

</body>
</html>
