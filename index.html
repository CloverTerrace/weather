<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clover Terrace Weather Station</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1724">
  <link rel="icon" href="/favicon.ico" sizes="any">
 <link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  /* ---------- Easy customization: edit these variables ---------- */
  :root {
    --bg-color: #0f1724;
    --card-color: #182338;
    --accent-color: #4fb0ff;
    --text-color: #eef2f7;
    --muted-color: #93a1b5;
    --font-family: Georgia, Verdana, system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 2rem 1rem;
    background: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-family);
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background-color 0.6s ease;
  }

  h1 {
    margin-bottom: 0.25rem;
    font-weight: 600;
  }

  #subtitle {
    color: var(--muted-color);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 900px;
  }

  .card {
    background: var(--card-color);
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .card .label {
    color: var(--muted-color);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .card .value {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--accent-color);
  }

  .card .unit {
    font-size: 1rem;
    color: var(--muted-color);
    margin-left: 0.2rem;
  }

  #status {
    margin-top: 2rem;
    color: var(--muted-color);
    font-size: 0.85rem;
    text-align: center;
  }

  #error-banner {
    display: none;
    background: #4a1f1f;
    color: #ffb4b4;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    margin-bottom: 1.5rem;
    max-width: 900px;
    width: 100%;
    text-align: center;
  }

  .chart-card {
    background: var(--card-color);
    border-radius: 12px;
    padding: 1.25rem;
    margin-top: 1.5rem;
    width: 100%;
    max-width: 900px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .chart-card h2 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    color: var(--muted-color);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .chart-wrap {
    position: relative;
    height: 300px;
  }

  #visitor-counter {
    margin-top: 2.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--card-color);
    padding: 0.6rem 1.1rem;
    border-radius: 999px;
    font-size: 0.9rem;
    color: var(--muted-color);
  }

  #visitor-counter .visitor-count {
    color: var(--accent-color);
    font-weight: 700;
  }

  .camera-card {
    background: var(--card-color);
    border-radius: 12px;
    padding: 1.25rem;
    margin-top: 1.5rem;
    width: 100%;
    max-width: 900px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    text-align: center;
  }

  .camera-card h2 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    color: var(--muted-color);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .camera-card img {
    max-width: 100%;
    border-radius: 8px;
    display: block;
    margin: 0 auto;
  }

  #refresh-btn {
    background: var(--accent-color);
    color: var(--bg-color);
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.3s ease;
    margin-top: 1rem;
  }

  #refresh-btn:hover:not(:disabled) {
    opacity: 0.85;
  }

  #refresh-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
</head>
<body>

  <h1><span id="weather-icon">🍀</span> Clover Terrace Weather Station</h1>
  <div id="subtitle">Loading...</div>

  <div id="error-banner"></div>

  <div class="grid" id="grid">
    <!-- Cards are injected by JS below -->
  </div>

  

  <div class="camera-card">
    <h2>Station Camera</h2>
    <img id="camera-img" src="data/camera.jpg" alt="Latest snapshot from the weather station camera">
  </div>

  <div class="chart-card">
    <h2>Temperature &amp; Humidity — Last 7 Days</h2>
    <div class="chart-wrap">
      <canvas id="historyChart"></canvas>
    </div>
  </div>

  <div class="chart-card">
    <h2>Wind Speed &amp; Gusts — Last 7 Days</h2>
    <div class="chart-wrap">
      <canvas id="windChart"></canvas>
    </div>
  </div>

  <div class="chart-card">
    <h2>Wind Direction — Last 7 Days</h2>
    <div class="chart-wrap">
      <canvas id="windRoseChart"></canvas>
    </div>
  </div>

  <div class="chart-card">
    <h2>Barometric Pressure — Last 7 Days</h2>
    <div class="chart-wrap">
      <canvas id="pressureChart"></canvas>
    </div>
  </div>

  <div id="status"></div>

  <button id="refresh-btn">🔄 Refresh Now</button>

  <div id="visitor-counter">
    <span>🌪️ Visitors:</span>
    <span class="visitor-count" id="visitor-count">…</span>
  </div>

<script>
  // Path to the JSON file the GitHub Action keeps updated.
  const DATA_URL = 'data/weather.json';
  // How often (ms) the page re-fetches the file to check for new data.
  const REFRESH_INTERVAL_MS = 60 * 1000;

  // Define which fields to show, in order, and how to label/format them.
  // Add, remove, or reorder entries here to customize the dashboard.
  const FIELDS = [
    { key: 'temp',           label: 'Temperature',   unit: '°F' },
    { key: 'heatIndex',      label: 'Heat Index',    unit: '°F' },
    { key: 'windChill',      label: 'Wind Chill',    unit: '°F' },
    { key: 'dewpt',          label: 'Dew Point',     unit: '°F' },
    { key: 'humidity',       label: 'Humidity',      unit: '%'  },
    { key: 'windSpeed',      label: 'Wind Speed',    unit: 'mph' },
    { key: 'windGust',       label: 'Wind Gust',     unit: 'mph' },
    { key: 'winddir',        label: 'Wind Dir',      unit: '°'  },
    { key: 'pressure',       label: 'Pressure',      unit: 'inHg' },
    { key: 'precipRate',     label: 'Precip Rate',   unit: 'in/hr' },
    { key: 'precipTotal',    label: 'Precip Today',  unit: 'in' },
    { key: 'solarRadiation', label: 'Solar Rad.',    unit: 'W/m²' },
    { key: 'uv',             label: 'UV Index',      unit: ''   },
  ];

  // Path to the rolling history file the fetch script maintains.
  const HISTORY_URL = 'data/history.json';

  const grid = document.getElementById('grid');
  const subtitle = document.getElementById('subtitle');
  const status = document.getElementById('status');
  const errorBanner = document.getElementById('error-banner');
  const refreshBtn = document.getElementById('refresh-btn');

  let historyChart = null;
  let windChart = null;
  let windRoseChart = null;
  let pressureChart = null;
  let isRefreshing = false;

  function renderChart(history) {
    const labels = history.map(entry => entry.time);
    const tempData = history.map(entry => entry.temp);
    const humidityData = history.map(entry => entry.humidity);

    const ctx = document.getElementById('historyChart').getContext('2d');

    if (historyChart) {
      // Update in place rather than recreating, so the chart doesn't flicker on refresh.
      historyChart.data.labels = labels;
      historyChart.data.datasets[0].data = tempData;
      historyChart.data.datasets[1].data = humidityData;
      historyChart.update();
      return;
    }

    historyChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Temperature (°F)',
            data: tempData,
            borderColor: '#4fb0ff',
            backgroundColor: 'rgba(79, 176, 255, 0.1)',
            yAxisID: 'yTemp',
            tension: 0.25,
            pointRadius: 0,
            borderWidth: 2,
          },
          {
            label: 'Humidity (%)',
            data: humidityData,
            borderColor: '#ffb84f',
            backgroundColor: 'rgba(255, 184, 79, 0.1)',
            yAxisID: 'yHumidity',
            tension: 0.25,
            pointRadius: 0,
            borderWidth: 2,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: {
            ticks: { color: '#93a1b5', maxTicksLimit: 10, autoSkip: true },
            grid: { color: 'rgba(255,255,255,0.05)' },
          },
          yTemp: {
            position: 'left',
            ticks: { color: '#4fb0ff' },
            grid: { color: 'rgba(255,255,255,0.05)' },
            title: { display: true, text: '°F', color: '#4fb0ff' },
          },
          yHumidity: {
            position: 'right',
            ticks: { color: '#ffb84f' },
            grid: { display: false },
            title: { display: true, text: '%', color: '#ffb84f' },
            min: 0,
            max: 100,
          },
        },
        plugins: {
          legend: { labels: { color: '#eef2f7' } },
        },
      },
    });
  }

  async function loadHistory(forceRefresh = false) {
    try {
      const url = forceRefresh ? `${HISTORY_URL}?t=${Date.now()}` : HISTORY_URL;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const history = await res.json();
      if (Array.isArray(history) && history.length > 0) {
        renderChart(history);
        renderWindChart(history);
        renderWindRose(history);
        renderPressureChart(history);
      }
    } catch (err) {
      // Don't block the rest of the page if history fails to load —
      // just leave the chart cards empty.
      console.warn('Could not load history data:', err.message);
    }
  }

  function renderWindChart(history) {
    const labels = history.map(entry => entry.time);
    const speedData = history.map(entry => entry.windSpeed);
    const gustData = history.map(entry => entry.windGust);

    const ctx = document.getElementById('windChart').getContext('2d');

    if (windChart) {
      windChart.data.labels = labels;
      windChart.data.datasets[0].data = speedData;
      windChart.data.datasets[1].data = gustData;
      windChart.update();
      return;
    }

    windChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Sustained (mph)',
            data: speedData,
            borderColor: '#7fe0c0',
            backgroundColor: 'rgba(127, 224, 192, 0.1)',
            tension: 0.25,
            pointRadius: 0,
            borderWidth: 2,
          },
          {
            label: 'Gust (mph)',
            data: gustData,
            borderColor: '#ff8f6b',
            backgroundColor: 'rgba(255, 143, 107, 0.08)',
            tension: 0.25,
            pointRadius: 0,
            borderWidth: 2,
            borderDash: [4, 3],
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: {
            ticks: { color: '#93a1b5', maxTicksLimit: 10, autoSkip: true },
            grid: { color: 'rgba(255,255,255,0.05)' },
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#93a1b5' },
            grid: { color: 'rgba(255,255,255,0.05)' },
            title: { display: true, text: 'mph', color: '#93a1b5' },
          },
        },
        plugins: {
          legend: { labels: { color: '#eef2f7' } },
        },
      },
    });
  }

  // Buckets history readings into 8 compass directions and averages wind
  // speed for each — a simple "wind rose" showing prevailing direction.
  const COMPASS_LABELS = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];

  function computeWindRose(history) {
    const sums = new Array(8).fill(0);
    const counts = new Array(8).fill(0);

    history.forEach(entry => {
      if (entry.winddir === undefined || entry.winddir === null) return;
      const idx = Math.round((entry.winddir % 360) / 45) % 8;
      sums[idx] += entry.windSpeed || 0;
      counts[idx] += 1;
    });

    return sums.map((sum, i) => (counts[i] ? Math.round((sum / counts[i]) * 10) / 10 : 0));
  }

  function renderWindRose(history) {
    const data = computeWindRose(history);
    const ctx = document.getElementById('windRoseChart').getContext('2d');

    if (windRoseChart) {
      windRoseChart.data.datasets[0].data = data;
      windRoseChart.update();
      return;
    }

    windRoseChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: COMPASS_LABELS,
        datasets: [
          {
            label: 'Avg wind speed (mph)',
            data: data,
            borderColor: '#7fe0c0',
            backgroundColor: 'rgba(127, 224, 192, 0.2)',
            pointBackgroundColor: '#7fe0c0',
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          r: {
            beginAtZero: true,
            ticks: { color: '#93a1b5', backdropColor: 'transparent' },
            grid: { color: 'rgba(255,255,255,0.08)' },
            angleLines: { color: 'rgba(255,255,255,0.08)' },
            pointLabels: { color: '#eef2f7' },
          },
        },
        plugins: {
          legend: { labels: { color: '#eef2f7' } },
        },
      },
    });
  }

  function renderPressureChart(history) {
    const labels = history.map(entry => entry.time);
    const pressureData = history.map(entry => entry.pressure);

    const ctx = document.getElementById('pressureChart').getContext('2d');

    if (pressureChart) {
      pressureChart.data.labels = labels;
      pressureChart.data.datasets[0].data = pressureData;
      pressureChart.update();
      return;
    }

    pressureChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Pressure (inHg)',
            data: pressureData,
            borderColor: '#c79bff',
            backgroundColor: 'rgba(199, 155, 255, 0.1)',
            tension: 0.25,
            pointRadius: 0,
            borderWidth: 2,
            fill: true,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: {
            ticks: { color: '#93a1b5', maxTicksLimit: 10, autoSkip: true },
            grid: { color: 'rgba(255,255,255,0.05)' },
          },
          y: {
            ticks: { color: '#93a1b5' },
            grid: { color: 'rgba(255,255,255,0.05)' },
            title: { display: true, text: 'inHg', color: '#93a1b5' },
          },
        },
        plugins: {
          legend: { labels: { color: '#eef2f7' } },
        },
      },
    });
  }

  // ---------- Weather-based color/icon themes ----------
  // NOTE: The Weather Underground API only gives raw sensor readings
  // (temp, precip rate, wind speed, solar radiation, etc.) — not an actual
  // "condition" label. So this is a heuristic guess at current conditions
  // based on those numbers, not a real forecast/condition read.

  // Tune these thresholds (mph / in-hr / °F) to match your climate.
  const WINDY_WIND_MPH = 20;           // sustained wind or gust above this = windy theme
  const THUNDERSTORM_WIND_MPH = 25;    // wind above this...
  const THUNDERSTORM_PRECIP_INHR = 0.1; // ...combined with precip rate above this = thunderstorm theme
  const EXTREME_HEAT_TEMP_F = 95;      // temp (or heat index, if higher) at/above this = extreme heat theme

  const THEMES = {
    sunny:        { bg: '#3a2f14', card: '#4a3d1c', accent: '#ffcc4d', icon: '☀️' },
    extremeHeat:  { bg: '#4a1907', card: '#5c2712', accent: '#ff6b35', icon: '🔥☀️' },
    cloudy:       { bg: '#6D96C0', card: '#D5E1ED', accent: '#4D80B3', icon: '☁️' },
    rainy:        { bg: '#101820', card: '#182430', accent: '#4fb0ff', icon: '🌧️' },
    snowy:        { bg: '#1b2430', card: '#25313f', accent: '#dff3ff', icon: '❄️' },
    night:        { bg: '#0a0f1e', card: '#131b2e', accent: '#7d9dff', icon: '🌙' },
    windy:        { bg: '#1c2b28', card: '#25372f', accent: '#7fe0c0', icon: '💨' },
    thunderstorm: { bg: '#181022', card: '#241a33', accent: '#ffffff', icon: '⛈️' },
  };

  function classifyWeather(data) {
    const hour = new Date(data.obsTimeLocal).getHours();
    const isNight = hour < 6 || hour >= 20;
    const precip = data.precipRate || 0;
    const wind = Math.max(data.windSpeed || 0, data.windGust || 0);
    const feelsLike = Math.max(data.temp || 0, data.heatIndex || 0);

    // Checked first/most specific to least, so a severe combo (storm) wins
    // over a single-factor read (just rainy, or just windy).
    if (precip >= THUNDERSTORM_PRECIP_INHR && wind >= THUNDERSTORM_WIND_MPH) return 'thunderstorm';
    if (precip > 0.01 && data.temp <= 32) return 'snowy';
    if (precip > 0.01) return 'rainy';
    if (wind >= WINDY_WIND_MPH) return 'windy';
    if (feelsLike >= EXTREME_HEAT_TEMP_F) return 'extremeHeat';
    if (isNight) return 'night';
    if ((data.solarRadiation || 0) > 400) return 'sunny';
    return 'cloudy';
  }

  function applyTheme(themeKey) {
    const theme = THEMES[themeKey] || THEMES.cloudy;
    const root = document.documentElement.style;
    root.setProperty('--bg-color', theme.bg);
    root.setProperty('--card-color', theme.card);
    root.setProperty('--accent-color', theme.accent);
    document.getElementById('weather-icon').textContent = theme.icon;
  }

  function renderCards(data) {
    grid.innerHTML = '';
    FIELDS.forEach(field => {
      const value = data[field.key];
      if (value === undefined || value === null) return;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="label">${field.label}</div>
        <div class="value">${value}<span class="unit">${field.unit}</span></div>
      `;
      grid.appendChild(card);
    });
  }

  async function loadData(forceRefresh = false) {
    try {
      const url = forceRefresh ? `${DATA_URL}?t=${Date.now()}` : DATA_URL;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      renderCards(data);
      applyTheme(classifyWeather(data));
      subtitle.textContent = data.neighborhood
        ? `Station ${data.stationID} — ${data.neighborhood}`
        : `Station ${data.stationID}`;

      errorBanner.style.display = 'none';
      status.textContent = `Last observation: ${data.obsTimeLocal || 'unknown'} · Page checked: ${new Date().toLocaleTimeString()}`;

      // Cache-bust the camera image so the browser re-fetches the file
      // instead of showing a stale cached copy of the same filename.
      const cameraImg = document.getElementById('camera-img');
      cameraImg.src = `data/camera.jpg?t=${Date.now()}`;
    } catch (err) {
      errorBanner.textContent = `Couldn't load weather data: ${err.message}`;
      errorBanner.style.display = 'block';
      status.textContent = `Last check attempt: ${new Date().toLocaleTimeString()}`;
    } finally {
      isRefreshing = false;
      refreshBtn.disabled = false;
    }
  }

  async function handleRefreshClick() {
    if (isRefreshing) return;
    isRefreshing = true;
    refreshBtn.disabled = true;
    await loadData(true);
    await loadHistory(true);
  }

  loadData();
  loadHistory();
  setInterval(loadData, REFRESH_INTERVAL_MS);
  // Refresh the chart less often than the current-conditions cards,
  // since new history entries only land every ~10 minutes anyway.
  setInterval(loadHistory, 5 * 60 * 1000);

  // Attach click handler to refresh button
  refreshBtn.addEventListener('click', handleRefreshClick);

  // ---------- Visitor counter (CounterAPI, free, no signup) ----------
  // IMPORTANT: change COUNTER_NAMESPACE/COUNTER_NAME to something unique
  // to you (e.g. your GitHub username + repo name). CounterAPI's free tier
  // is public, so a generic name could be shared/incremented by other sites.
  const COUNTER_NAMESPACE = 'CloverTerraceWXStation';
  const COUNTER_NAME = 'weather-station-visits';

  async function initVisitorCounter() {
    const el = document.getElementById('visitor-count');
    try {
      const res = await fetch(
        `https://api.counterapi.dev/v1/${COUNTER_NAMESPACE}/${COUNTER_NAME}/up`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      el.textContent = data.value;
    } catch (err) {
      el.textContent = '—';
      console.warn('Visitor counter unavailable:', err.message);
    }
  }

  // Runs once per page load — intentionally NOT tied to the refresh
  // intervals above, so revisits/auto-refreshes don't inflate the count.
  initVisitorCounter();

  // Register the service worker (enables installability + the app shell
  // caching described in sw.js). Safe to no-op in browsers that don't
  // support it.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }
</script>

</body>
</html>
