<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clover Terrace Weather</title>
<style>
  /* ---------- Easy customization: edit these variables ---------- */
  :root {
    --bg-color: #0f1724;
    --card-color: #182338;
    --accent-color: #4fb0ff;
    --text-color: #eef2f7;
    --muted-color: #93a1b5;
    --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 2rem 1rem;
    background: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-family);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin-bottom: 0.25rem;
    font-weight: 600;
  }

  #subtitle {
    color: var(--muted-color);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 900px;
  }

  .card {
    background: var(--card-color);
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .card .label {
    color: var(--muted-color);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .card .value {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--accent-color);
  }

  .card .unit {
    font-size: 1rem;
    color: var(--muted-color);
    margin-left: 0.2rem;
  }

  #status {
    margin-top: 2rem;
    color: var(--muted-color);
    font-size: 0.85rem;
    text-align: center;
  }

  #error-banner {
    display: none;
    background: #4a1f1f;
    color: #ffb4b4;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    margin-bottom: 1.5rem;
    max-width: 900px;
    width: 100%;
    text-align: center;
  }

  .chart-card {
    background: var(--card-color);
    border-radius: 12px;
    padding: 1.25rem;
    margin-top: 1.5rem;
    width: 100%;
    max-width: 900px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .chart-card h2 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    color: var(--muted-color);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .chart-wrap {
    position: relative;
    height: 300px;
  }

  #visitor-counter {
    margin-top: 2.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--card-color);
    padding: 0.6rem 1.1rem;
    border-radius: 999px;
    font-size: 0.9rem;
    color: var(--muted-color);
  }

  #visitor-counter .visitor-count {
    color: var(--accent-color);
    font-weight: 700;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
</head>
<body>

  <h1>🌦️ My Weather Station</h1>
  <div id="subtitle">Loading...</div>

  <div id="error-banner"></div>

  <div class="grid" id="grid">
    <!-- Cards are injected by JS below -->
  </div>

  <div id="status"></div>

  <div class="chart-card">
    <h2>Temperature &amp; Humidity — Last 7 Days</h2>
    <div class="chart-wrap">
      <canvas id="historyChart"></canvas>
    </div>
  </div>

  <div id="visitor-counter">
    <span>⛅ Visitors weathering this page:</span>
    <span class="visitor-count" id="visitor-count">…</span>
  </div>

<script>
  // Path to the JSON file the GitHub Action keeps updated.
  const DATA_URL = 'data/weather.json';
  // Path to the rolling history file the fetch script maintains.
  const HISTORY_URL = 'data/history.json';
  // How often (ms) the page re-fetches the file to check for new data.
  const REFRESH_INTERVAL_MS = 60 * 1000;

  // Define which fields to show, in order, and how to label/format them.
  // Add, remove, or reorder entries here to customize the dashboard.
  const FIELDS = [
    { key: 'temp',           label: 'Temperature',   unit: '°F' },
    { key: 'heatIndex',      label: 'Heat Index',    unit: '°F' },
    { key: 'windChill',      label: 'Wind Chill',    unit: '°F' },
    { key: 'dewpt',          label: 'Dew Point',     unit: '°F' },
    { key: 'humidity',       label: 'Humidity',      unit: '%'  },
    { key: 'windSpeed',      label: 'Wind Speed',    unit: 'mph' },
    { key: 'windGust',       label: 'Wind Gust',     unit: 'mph' },
    { key: 'winddir',        label: 'Wind Dir',      unit: '°'  },
    { key: 'pressure',       label: 'Pressure',      unit: 'inHg' },
    { key: 'precipRate',     label: 'Precip Rate',   unit: 'in/hr' },
    { key: 'precipTotal',    label: 'Precip Today',  unit: 'in' },
    { key: 'solarRadiation', label: 'Solar Rad.',    unit: 'W/m²' },
    { key: 'uv',             label: 'UV Index',      unit: ''   },
  ];

  const grid = document.getElementById('grid');
  const subtitle = document.getElementById('subtitle');
  const status = document.getElementById('status');
  const errorBanner = document.getElementById('error-banner');

  let historyChart = null;

  function renderChart(history) {
    const labels = history.map(entry => entry.time);
    const tempData = history.map(entry => entry.temp);
    const humidityData = history.map(entry => entry.humidity);

    const ctx = document.getElementById('historyChart').getContext('2d');

    if (historyChart) {
      // Update in place rather than recreating, so the chart doesn't flicker on refresh.
      historyChart.data.labels = labels;
      historyChart.data.datasets[0].data = tempData;
      historyChart.data.datasets[1].data = humidityData;
      historyChart.update();
      return;
    }

    historyChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Temperature (°F)',
            data: tempData,
            borderColor: '#4fb0ff',
            backgroundColor: 'rgba(79, 176, 255, 0.1)',
            yAxisID: 'yTemp',
            tension: 0.25,
            pointRadius: 0,
            borderWidth: 2,
          },
          {
            label: 'Humidity (%)',
            data: humidityData,
            borderColor: '#ffb84f',
            backgroundColor: 'rgba(255, 184, 79, 0.1)',
            yAxisID: 'yHumidity',
            tension: 0.25,
            pointRadius: 0,
            borderWidth: 2,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: {
            ticks: { color: '#93a1b5', maxTicksLimit: 10, autoSkip: true },
            grid: { color: 'rgba(255,255,255,0.05)' },
          },
          yTemp: {
            position: 'left',
            ticks: { color: '#4fb0ff' },
            grid: { color: 'rgba(255,255,255,0.05)' },
            title: { display: true, text: '°F', color: '#4fb0ff' },
          },
          yHumidity: {
            position: 'right',
            ticks: { color: '#ffb84f' },
            grid: { display: false },
            title: { display: true, text: '%', color: '#ffb84f' },
            min: 0,
            max: 100,
          },
        },
        plugins: {
          legend: { labels: { color: '#eef2f7' } },
        },
      },
    });
  }

  async function loadHistory() {
    try {
      const res = await fetch(HISTORY_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const history = await res.json();
      if (Array.isArray(history) && history.length > 0) {
        renderChart(history);
      }
    } catch (err) {
      // Don't block the rest of the page if history fails to load —
      // just leave the chart card empty.
      console.warn('Could not load history data:', err.message);
    }
  }

  function renderCards(data) {
    grid.innerHTML = '';
    FIELDS.forEach(field => {
      const value = data[field.key];
      if (value === undefined || value === null) return;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="label">${field.label}</div>
        <div class="value">${value}<span class="unit">${field.unit}</span></div>
      `;
      grid.appendChild(card);
    });
  }

  async function loadData() {
    try {
      const res = await fetch(DATA_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      renderCards(data);
      subtitle.textContent = data.neighborhood
        ? `Station ${data.stationID} — ${data.neighborhood}`
        : `Station ${data.stationID}`;

      errorBanner.style.display = 'none';
      status.textContent = `Last observation: ${data.obsTimeLocal || 'unknown'} · Page checked: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      errorBanner.textContent = `Couldn't load weather data: ${err.message}`;
      errorBanner.style.display = 'block';
      status.textContent = `Last check attempt: ${new Date().toLocaleTimeString()}`;
    }
  }

  loadData();
  loadHistory();
  setInterval(loadData, REFRESH_INTERVAL_MS);
  // Refresh the chart less often than the current-conditions cards,
  // since new history entries only land every ~10 minutes anyway.
  setInterval(loadHistory, 5 * 60 * 1000);

  // ---------- Visitor counter (CounterAPI, free, no signup) ----------
  // IMPORTANT: change COUNTER_NAMESPACE/COUNTER_NAME to something unique
  // to you (e.g. your GitHub username + repo name). CounterAPI's free tier
  // is public, so a generic name could be shared/incremented by other sites.
  const COUNTER_NAMESPACE = 'change-me-yourusername';
  const COUNTER_NAME = 'weather-station-visits';

  async function initVisitorCounter() {
    const el = document.getElementById('visitor-count');
    try {
      const res = await fetch(
        `https://api.counterapi.dev/v1/${CloverTerraceWX}/${WeatherWatchers}/up`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      el.textContent = data.value;
    } catch (err) {
      el.textContent = '—';
      console.warn('Visitor counter unavailable:', err.message);
    }
  }

  // Runs once per page load — intentionally NOT tied to the refresh
  // intervals above, so revisits/auto-refreshes don't inflate the count.
  initVisitorCounter();
</script>

</body>
</html>
