name: Update Weather Data

on:
  schedule:
    - cron: '3-59/5 * * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pillow

      - name: Fetch latest weather data
        env:
          WU_STATION_ID: ${{ secrets.WU_STATION_ID }}
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
        run: python scripts/fetch_weather.py

      - name: Fetch latest camera snapshot
        continue-on-error: true   # don't let a camera hiccup block weather data updates
        env:
          ECOWITT_APP_KEY: ${{ secrets.ECOWITT_APP_KEY }}
          ECOWITT_API_KEY: ${{ secrets.ECOWITT_API_KEY }}
          ECOWITT_MAC: ${{ secrets.ECOWITT_MAC }}
        run: python scripts/fetch_camera.py

      - name: Fetch local forecast
        continue-on-error: true   # don't let a forecast hiccup block weather data updates
        run: python scripts/fetch_forecast.py

        
      - name: Fetch air quality
        continue-on-error: true   # don't let an AQI hiccup block weather data updates
        run: python scripts/fetch_aqi.py

      - name: Fetch current SPC outlook
        continue-on-error: true   # don't let an outlook hiccup block weather data updates
        run: python scripts/fetch_outlook.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in data/weather.json data/history.json data/camera.jpg data/forecast.json data/outlook-day1.png data/outlook-day2.png data/outlook-day3.png data/aqi.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet || git commit -m "Update weather data [skip ci]"
          git push
